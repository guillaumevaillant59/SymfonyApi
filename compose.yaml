services:
  app:
    build: .
    container_name: symfony_app
    ports:
      - "8001:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - database
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html/public

  database:
    image: mysql:8.0
    container_name: catalogue_mysql
    environment:
      MYSQL_DATABASE: democatalogue
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password

  cloudbeaver:
    image: dbeaver/cloudbeaver
    container_name: serverCloudBeaver851
    restart: unless-stopped
    depends_on:
      - database
    ports:
      - "7852:8978"

  mailer:
    image: axllent/mailpit
    ports:
      - "1026:1025"
      - "8026:8025"